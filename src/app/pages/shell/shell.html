<div class="layout">
  <header class="header">
    <a routerLink="/" class="logo">RESTHeart Cloud</a>

    <div class="user-menu">
      <button type="button" class="avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
        {{ initials() }}
      </button>

      @if (menuOpen()) {
        <div class="dropdown" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <span class="dropdown-name">{{ displayName() }}</span>
            <span class="dropdown-email">{{ activeTeamName() }}</span>
          </div>
          <div class="dropdown-divider"></div>
          <a routerLink="/account" class="dropdown-item" (click)="closeMenu()">Account</a>
          <a routerLink="/teams" class="dropdown-item" (click)="closeMenu()">Teams</a>
          <div class="dropdown-divider"></div>
          <button type="button" class="dropdown-item dropdown-item-danger" (click)="logout()">Logout</button>
        </div>
      }
    </div>
  </header>

  @if (justVerified()) {
    <div class="welcome-banner">
      <p>🎉 Your email has been verified — welcome aboard!</p>
      <button type="button" class="btn-dismiss" (click)="dismissWelcome()">✕</button>
    </div>
  }

  <main class="main">
    <router-outlet />
  </main>
</div>
