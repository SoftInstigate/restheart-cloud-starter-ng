<main class="auth-page">
  @if (missingParams) {
    <div class="auth-card">
      <h1>Invalid link</h1>
      <p>This password reset link is missing required information.</p>
      <p class="auth-links"><a routerLink="/auth/forgot-password">Request a new link</a></p>
    </div>
  } @else {
    <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <h1>Set a new password</h1>

      @if (error()) {
        <app-alert type="error" (close)="error.set(null)">{{ error() }}</app-alert>
      }

      <label for="password">New password</label>
      <div class="password-field">
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          autocomplete="new-password"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
          [attr.aria-describedby]="form.controls.password.invalid && form.controls.password.touched ? 'error-password' : null"
        />
        <button type="button" class="btn-toggle-password" (click)="showPassword.update(v => !v)">
          {{ showPassword() ? 'Hide' : 'Show' }}
        </button>
      </div>
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <p id="error-password" class="field-error">Password must be at least 8 characters.</p>
      }

      <button type="submit" [disabled]="loading() || form.invalid">
        {{ loading() ? 'Saving…' : 'Set password' }}
      </button>
    </form>
  }
</main>
