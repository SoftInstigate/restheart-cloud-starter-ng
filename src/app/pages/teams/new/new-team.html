<section class="card">
  <a routerLink="/teams" class="back-link">← Back to teams</a>
  <h2>Create a new team</h2>

  @if (error()) {
    <app-alert type="error" (close)="error.set(null)">{{ error() }}</app-alert>
  }

  <form [formGroup]="form" (ngSubmit)="createTeam()" novalidate class="account-form">
    <div class="form-field">
      <label for="team-name">Team name</label>
      <input id="team-name" type="text" formControlName="teamName" placeholder="Acme Corp" />
    </div>
    <button type="submit" class="btn-primary" [disabled]="saving()">
      {{ saving() ? 'Creating…' : 'Create team' }}
    </button>
  </form>
</section>
